<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGIOS Clock</title>
  <style id="main-style">
    body {
      font-family: monospace;
      background: #0d0d0d;
      color: #00ffcc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .clock {
      text-align: center;
      font-size: 1.5rem;
    }
    .label {
      color: #999;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="clock" id="clock-ui">
    <div><span class="label">CGIOS Time:</span> <span id="cgios-day"></span></div>
    <div><span class="label">UTC Now:</span> <span id="utc-time"></span></div>
  </div>

  <script>
    const epoch = new Date('2025-04-18T00:00:00Z');

    function getCGIOSTime() {
      const now = new Date();
      const utcNow = new Date(now.toISOString());
      const diff = utcNow - epoch;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;

      return {
        cgios_day: `AI Day ${days}`,
        utc: utcNow.toISOString()
      };
    }

    const isJsonMode = window.location.hash === '#json';

    if (isJsonMode) {
      // Remove UI and styling
      document.body.innerHTML = '';
      const style = document.getElementById('main-style');
      if (style) style.remove();

      // Output JSON
      const result = getCGIOSTime();
      document.write('<pre>' + JSON.stringify(result, null, 2) + '</pre>');
    } else {
      // Standard UI update
      function updateClock() {
        const data = getCGIOSTime();
        document.getElementById('cgios-day').textContent = data.cgios_day;
        document.getElementById('utc-time').textContent = new Date(data.utc).toUTCString();
      }

      updateClock();
      setInterval(updateClock, 1000);
    }
  </script>
</body>
</html>
